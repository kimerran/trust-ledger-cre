[profile.default]
src = "src"
out = "out"
libs = ["lib"]
dotenv = "../.env"
test = "test"
script = "script"
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false
fuzz = { runs = 256 }

[profile.ci]
fuzz = { runs = 1000 }

[rpc_endpoints]
sepolia = "${ALCHEMY_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.etherscan.io/api" }
